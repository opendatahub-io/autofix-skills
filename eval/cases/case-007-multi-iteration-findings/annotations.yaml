expected_verdict: "committed"
expected_files_changed_count: 2  # csv_export.py + test_csv_export.py
expected_validation:
  lint_passed: null
  build_passed: null
  tests_passed: true
iteration_expectation: |
  This case is designed to trigger multi-iteration behavior.
  The bug requires RFC 4180 quoting logic (commas, quotes, newlines).
  A naive first implementation is likely to miss edge cases:
  - Escaping double quotes by doubling them (O"Brien -> "O""Brien")
  - Handling newlines within quoted fields
  - Quoting the header row if headers contain special characters
  The review agent should find at least one critical or minor finding
  after the first implementation, forcing a second implement pass.
  Tests iteration_decision_correctness judge with real multi-iteration.
notes: |
  The CSV quoting bug has multiple interacting edge cases that are
  hard to get right in a single pass. The review agent should catch
  missing edge cases (e.g., values that start with a space, values
  that are just a double quote, empty string vs None handling).
  This exercises the implement -> review -> re-implement loop.
  Python environment allows pytest to run and validate the fix.
