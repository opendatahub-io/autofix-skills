name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make shellcheck

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Build skilleval
      id: build_skilleval
      env:
        SKILLEVAL_COMMIT: 3aed8a597c017ee8058f531d4190482dda1d5154
      run: |
        git clone https://github.com/natifridman/skilleval.git /tmp/skilleval
        git -C /tmp/skilleval checkout "$SKILLEVAL_COMMIT"
        cd /tmp/skilleval && npm ci && npm run build

    - name: Run lint
      run: make lint
      env:
        SKILLEVAL_BIN: /tmp/skilleval/bin/skilleval.js

    - name: Run skilleval with GitHub annotations
      if: always() && steps.build_skilleval.outcome == 'success'
      run: node /tmp/skilleval/bin/skilleval.js check skills/*/ --strict --format github
